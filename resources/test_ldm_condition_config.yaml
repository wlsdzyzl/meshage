# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: LDM
  diffusion:
    name: EDM
    classifier_free_guidance:
      condition_dropout: 0.2
      guidance_weight: 2.0
    eps_model:
      time_channel: 128
      encoder:
        name: SeqTrans
        in_channel: 16
        point_num: 256
        building_block: pct_sa
        seq_feature_channels: [512, 512, 512, 512, 512, 512]
        num_heads: 8
        d_k: 64
        activation: gelu
        normalization: layer
        # vector_embedding: false
      condition_embedding:
        combine_condition: injection
        condition_injection: gate_bias
        encoder:
          name: OneHot
          type: categories
          out_channel: 128
          num_classes: 2
        decoder: same_as_encoder
    eps_loss:
      name: MSE
  autoencoder:
    name: SKSDF
    skeleton_constraints: True
    coordinate_sampling_ratio: 0.1
    encoder:
      name: SKSDFCNN
      in_channel: 3
      out_channel: 1
      point_num: 2560
      building_block: res_dense
      projection_channel: 64
      num_neighbors_k_cross: 32
      num_neighbors_k_self: 0
      local_feature_channels: [512, 512, 512, 512]
      seq_feature_channels: [512, 512, 512, 512]
      dense_channels: [512, 12]
      pos_embedding: true
      # voxel_resolutions: [0, 0, 16, 16, 0, 0]
      activation: gelu
      normalization: layer
      standardize_latents: True
      with_radius: True
      skeleton_net_config:
        skp_num: 256
        isk_num: 2
        skp_neighbor_num: 32
        radius_scaling: 1.0
        dbscan_eps: 0.65
        dbscan_min_sample_num: 1
    condition_embedding:
      combine_condition: injection
      condition_injection: gate_bias
      encoder:
        name: OneHot
        type: categories
        out_channel: 128
        num_classes: 2
    reconstruction_losses: 
      - name: MSE
    
model_path:
  diff_model: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SeqTrans_AE_C12_Dilated_Coronary_Condition_NewR_Inter2/ckp_last.pth
  ae_model: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SkResCNN_AE_C12_Dilated_Coronary_Condition_NewR_Inter2/ckp_best_loss.pth
eval_gen:
  conditions: 
    left: 1
    right: 2
  condition_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 2
    - name: ToTensor  
  sampler:
    name: NormalSampler
    batch_size: 2
  gen_dir: /media/wlsdzyzl/DATA/vcg-results/gen/imageCAS/LDM_EDM_Condition_NewR_Inter2/
  ### new generation from random noise
  random_sample_num: 64
