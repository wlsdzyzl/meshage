# train ae or vae
#### a template for pcd encoder
mode: train
model:
  # can be AE, VAE, SeM and DDPM
  name: AE
  encoder:
    name: PointTrans
    in_channel: 3
    out_channel: 3
    point_num: 2560
    projection_channel: 64
    num_neighbors_k: 20
    building_block: pct_oa
    local_feature_channels: [512, 512, 512, 512]
    dense_channels: [1024, 1024]
    activation: lrelu
    normalization: group
    vector_embedding: True
    num_blocks: 2
  decoder:
    name: PointNet
    folding_times: 2
  condition_embedding:
    combine_condition: injection
    condition_injection: gate_bias
    encoder:
      name: OneHot
      type: categories
      out_channel: 128
      num_classes: 14
  reconstruction_losses: 
    - name: DCD
      alpha: 40
      n_lambda: 0.5
    - name: CD
      weight: 0.001
loader:
  dataset: 
    name: PcdClsDataset
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
    cls_label: MedSDF
  data_path_list: 
    - /data/guoqingzhang/datasets/MedSDF/split/fold1/raw
    - /data/guoqingzhang/datasets/MedSDF/split/fold2/raw
    - /data/guoqingzhang/datasets/MedSDF/split/fold3/raw
    - /data/guoqingzhang/datasets/MedSDF/split/fold4/raw
  batch_size: 2
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 2560
    - name: ToTensor
  target_transforms:
    - name: FixedPoints
      num: 2560
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 14
    - name: ToTensor
val_split_ratio: 0.1
val_split_seed: 42
check_point_dir: /data/guoqingzhang/meshage-ckp/MedSDF/PCT_AE_FOLDING2
### parameter for optimizer
optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 0.00000001
### scheduler for learning rate
lr_scheduler: 
  name: LinearLR
  start_factor: 1.0
  end_factor: 0.01
resume: True
max_epoch: 150
write_after_iters: 10
write_sample_num: 4
save_after_epochs: 2
warmup_epochs: 1
warmup_start_scale: 0.01
clip_grad: 1.0
# custom_write_results: [input_sphere, recon_dpm_sphere, gen_sphere]
