# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: AE
  encoder:
    name: PointMamba2
    in_channel: 3
    out_channel: 3
    point_num: 2560
    building_block: pmamba_non_ffn
    num_neighbors_k: 32
    num_fps_points: [1280, 640, 320, 160]
    fps_feature_channels: [512, 512, 512, 512]
    neighbor_radius: [0.2, 0.4, 0.6, 0.8]
    dense_channels: [1024, 1024]
    activation: lrelu
    normalization: group
    long_range_modeling: True
    scan_strategies: [x_order, y_order, z_order, center_dist]
    sorted_query: True
    flip_scan: True
    pos_embedding: True
    vector_embedding: True
    knn_query: feature
    final_concat: True
    channel_attention: eca
  decoder:
    name: PointNet
    building_block: dense
    folding_times: 2
  condition_embedding:
    combine_condition: injection
    condition_injection: gate_bias
    encoder:
      name: OneHot
      type: categories
      out_channel: 128
      num_classes: 14
  reconstruction_losses: 
    - name: DCD
      alpha: 40
      n_lambda: 0.5
    - name: CD
      weight: 0.001
loader:
  dataset: 
    name: PcdClsDataset
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
    cls_label: MedSDF
  data_path_list: 
    - /data/guoqingzhang/datasets/MedSDF/split/fold5/raw
  batch_size: 4
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 2560
    - name: ToTensor
  target_transforms:
    - name: FixedPoints
      num: 2560
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 14
    - name: ToTensor
## C12: Channel = 12; R: with radius; T: truncate_sdf; TS: scaling truncated SDF to [-1, 1]
## SS: scale and shift; RC: radius constraints

pickle_results: True
pickle_path: /data/guoqingzhang/vcg-pickle
model_path: /data/guoqingzhang/vcg-ckp/MedSDF/PointMamba2_NON_FFN_AE_FOLDING2/ckp_best_loss.pth
recon_dir: /data/guoqingzhang/vcg-results/MedSDF/recon_pcd/PointMamba2_NON_FFN_AE_FOLDING2
