# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: ClM
  # encoder config
  encoder:
    name: PointNet
    in_channel: 3
    out_channel: 46
    point_num: 2048
    building_block: dense
    num_neighbors_k: 20
    local_feature_channels: [64, 64, 128, 256, 512]
    dense_channels: [512, 512]
    activation: lrelu
    normalization: group
  classification_losses: 
    - name: CE
loader:
  dataset: 
    name: PcdClsDataset
    data_suffix: .ply
    cls_label: MedPointS
  data_path_list: 
    - /data/guoqingzhang/datasets/MedPointS/classification/fold1
    - /data/guoqingzhang/datasets/MedPointS/classification/fold2
    - /data/guoqingzhang/datasets/MedPointS/classification/fold3
    - /data/guoqingzhang/datasets/MedPointS/classification/fold4
    - /data/guoqingzhang/datasets/MedPointS/classification/fold5
  batch_size: 16
  num_workers: 8
  shuffle: false
  data_transforms:
    - name: Normalize
    - name: FixedPoints
      num: 2048
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 46
    - name: ToTensor
model_path: /data/guoqingzhang/flemme-ckp/MedPointS/DGCNN_FOR_FID/ckp_last.pth
# evaluation_metrics:
#   seg:
#     - name: Dice
#     - name: ACC
#     - name: mIoU
pickle_results: true
pickle_path: /data/guoqingzhang/flemme-pickled/medpoints
load_pickle_results: true
tsne_visualization: 
  top_n: 15
  title: t-SNE Visualization
  vis_dim: 2
  perplexity: 6
  # perplexity: 10
  size: 10
  alpha: 0.8
  remove_ticks: true
