# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: LDM
  diffusion:
    name: EDM
    # classifier_free_guidance:
    #   condition_dropout: 0.2
    #   guidance_weight: 2.0
    eps_model:
      time_channel: 128
      encoder:
        name: SeqTrans
        in_channel: 15
        point_num: 400
        building_block: pct_sa
        seq_feature_channels: [512, 512, 512, 512, 512, 512]
        num_heads: 8
        d_k: 64
        activation: gelu
        normalization: layer
    eps_loss:
      name: MSE
  autoencoder:
    name: SDF
    coordinate_sampling_ratio: 0.1
    encoder:
      name: SPSDFCNN
      in_channel: 3
      out_channel: 1
      point_num: 4096
      building_block: res_dense
      projection_channel: 64
      num_neighbors_k: 32
      num_fps_points: [2560, 1280, 640, 400]
      # neighbor_radius: [0.2, 0.4, 0.6, 0.8]
      fps_feature_channels: [512, 512, 512, 512]
      seq_feature_channels: [512, 512, 512, 512]
      dense_channels: [512, 12]
      pos_embedding: true
      # voxel_resolutions: [0, 0, 16, 16, 0, 0]
      activation: gelu
      normalization: layer
      standardize_latents: True
      self_atten_for_latent: True
      latent_projection_channel: 512
    reconstruction_losses: 
      - name: MSE
    
model_path:
  diff_model: /data/guoqingzhang/meshage-ckp/CoW_vessel_diff/SeqTrans_SpCNN_with_LPC_LA/ckp_last.pth
  ae_model: /data/guoqingzhang/meshage-ckp/CoW_vessel_diff/SpCNN_val_with_LPC_LA/ckp_best_loss.pth
eval_gen:
  sampler:
    name: NormalSampler
    batch_size: 2
  gen_dir: /data/guoqingzhang/meshage-results/CoW_vessel_diff/gen/LDM_EDM_SpCNN_with_LPC_LA/
  ### new generation from random noise
  random_sample_num: 500
