# train ae or vae
#### a template for pcd encoder
mode: train
model:
  # can be AE, VAE, SeM and DDPM
  name: SDF
  # latent_point_constraints: True
  # latent_point_inter_num: 2
  encoder:
    name: SPSDFCNN
    in_channel: 3
    out_channel: 1
    point_num: 4096
    building_block: res_dense
    projection_channel: 64
    num_neighbors_k: 32
    num_fps_points: [2560, 1280, 640, 400]
    # neighbor_radius: [0.2, 0.4, 0.6, 0.8]
    fps_feature_channels: [512, 512, 512, 512]
    seq_feature_channels: [512, 512, 512, 512]
    dense_channels: [512, 12]
    pos_embedding: true
    # voxel_resolutions: [0, 0, 16, 16, 0, 0]
    activation: gelu
    normalization: layer
    standardize_latents: True
  # condition_embedding:
  #   combine_condition: injection
  #   condition_injection: gate_bias
  #   encoder:
  #     name: OneHot
  #     type: categories
  #     out_channel: 128
  #     num_classes: 2
  reconstruction_losses: 
    - name: MSE
loader:
  dataset: 
    name: PcdSDFDataset
    truncate_prob: 1.0
    resolution: 0.022
    data_dir: surface
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
  data_path_list: 
    - /data/guoqingzhang/datasets/CoW/fold1
    - /data/guoqingzhang/datasets/CoW/fold2
    - /data/guoqingzhang/datasets/CoW/fold3
  batch_size: 2
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 4096
    - name: ToTensor
  target_transforms:
    - name: FixedPoints
      num: 4096
    - name: ToTensor
val_loader:
  dataset: 
    name: PcdSDFDataset
    truncate_prob: 1.0
    resolution: 0.022
    data_dir: surface
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
  data_path_list: 
    - /data/guoqingzhang/datasets/CoW/fold4
  batch_size: 4
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 4096
    - name: ToTensor
  target_transforms:
    - name: FixedPoints
      num: 4096
    - name: ToTensor

## RTS, RC: radius constraints, Rscaling: radius scaling
check_point_dir: /data/guoqingzhang/meshage-ckp/CoW_vessel_diff/SpCNN_val/
### parameter for optimizer
optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 0.00000001
### scheduler for learning rate
lr_scheduler: 
  name: LinearLR
  start_factor: 1.0
  end_factor: 0.01
resume: True
max_epoch: 600
write_after_iters: 10
write_sample_num: 4
save_after_epochs: 5
warmup_epochs: 1
warmup_start_scale: 0.01
clip_grad: 1.0
# custom_write_results: [input_sphere, recon_dpm_sphere, gen_sphere]