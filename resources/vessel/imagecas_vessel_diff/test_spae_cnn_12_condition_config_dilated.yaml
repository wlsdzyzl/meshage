# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: SDF
  coordinate_sampling_ratio: 0.1
  # latent_point_constraints: True
  # latent_point_inter_num: 2
  encoder:
    name: SPSDFCNN
    in_channel: 3
    out_channel: 1
    point_num: 4096
    building_block: res_dense
    projection_channel: 64
    num_neighbors_k: 32
    num_fps_points: [2560, 1280, 640, 400]
    # neighbor_radius: [0.2, 0.4, 0.6, 0.8]
    fps_feature_channels: [512, 512, 512, 512]
    seq_feature_channels: [512, 512, 512, 512]
    dense_channels: [512, 12]
    pos_embedding: true
    # voxel_resolutions: [0, 0, 16, 16, 0, 0]
    activation: gelu
    normalization: layer
    standardize_latents: True
  # condition_embedding:
  #   combine_condition: injection
  #   condition_injection: gate_bias
  #   encoder:
  #     name: OneHot
  #     type: categories
  #     out_channel: 128
  #     num_classes: 2
  reconstruction_losses: 
    - name: MSE
loader:
  dataset: 
    name: PcdSDFDataset
    truncate_prob: 1.0
    resolution: 0.022
    data_dir: surface
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
  data_path_list: 
    - /data/guoqingzhang/datasets/imageCAS/fold1
    - /data/guoqingzhang/datasets/imageCAS/fold2
    - /data/guoqingzhang/datasets/imageCAS/fold3
    - /data/guoqingzhang/datasets/imageCAS/fold4
    # - /data/guoqingzhang/datasets/imageCAS/fold5
  batch_size: 2
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 4096
    - name: ToTensor
  target_transforms:
    - name: ToTensor
pickle_results: True
## RTS, RC: radius constraints, Rscaling: radius scaling
model_path: /data/guoqingzhang/meshage-ckp/imageCAS_vessel_diff/SpCNN_val/ckp_best_loss.pth
recon_dir: /data/guoqingzhang/meshage-results/imageCAS_vessel_diff/mesh/SpCNN_val_for_train

custom_save_results: 
  - name: latent
    dir: /data/guoqingzhang/meshage-results/imageCAS_vessel_diff/latent/SpCNN_val_for_train
  - name: latent_points
    dir: /data/guoqingzhang/meshage-results/imageCAS_vessel_diff/skeleton/SpCNN_val_for_train
# custom_write_results: [input_sphere, recon_dpm_sphere, gen_sphere]