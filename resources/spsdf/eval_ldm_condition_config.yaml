sub_dirs: [left, right]
prediction:
  path: /media/wlsdzyzl/DATA/vcg-results/gen/imageCAS/LDM_EDM_SpCNN
  suffix: .ply
  transforms: 
    - name: FixedPoints
      method: qfps
      num: 2560
target:
  path: /media/wlsdzyzl/DATA/datasets/pcd/imageCAS/output_dilated/standardized/split/fold5/rmesh022
  suffix: _mesh.ply
  data_form: pcd
  transforms: 
    - name: FixedPoints
      method: qfps
      num: 2560
eval_type: gen
# eval_batch_num: 2
evaluation_metrics:
    - name: FID
      embedding_net:
        # can be AE, VAE, SeM and DDPM
        name: ClM
        # encoder config
        encoder:
          name: PointNet
          in_channel: 3
          out_channel: 46
          point_num: 2048
          building_block: dense
          num_neighbors_k: 20
          local_feature_channels: [64, 64, 128, 256, 512]
          dense_channels: [512, 512]
          activation: lrelu
          normalization: group
      embedding_net_path: /media/wlsdzyzl/DATA/flemme-ckp/MedPointS/DGCNN_FOR_FID/ckp_last.pth
      batch_size: 2
    - name: KID
      embedding_net:
        # can be AE, VAE, SeM and DDPM
        name: ClM
        # encoder config
        encoder:
          name: PointNet
          in_channel: 3
          out_channel: 46
          point_num: 2048
          building_block: dense
          num_neighbors_k: 20
          local_feature_channels: [64, 64, 128, 256, 512]
          dense_channels: [512, 512]
          activation: lrelu
          normalization: group
      embedding_net_path: /media/wlsdzyzl/DATA/flemme-ckp/MedPointS/DGCNN_FOR_FID/ckp_last.pth
      batch_size: 2
