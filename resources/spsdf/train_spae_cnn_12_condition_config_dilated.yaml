# train ae or vae
#### a template for pcd encoder
mode: train
model:
  # can be AE, VAE, SeM and DDPM
  name: SDF
  latent_point_constraints: True
  # latent_point_inter_num: 2
  encoder:
    name: SPSDFCNN
    in_channel: 3
    out_channel: 1
    point_num: 2560
    building_block: res_dense
    projection_channel: 64
    num_neighbors_k: 32
    num_fps_points: [1280, 640, 320, 256]
    fps_feature_channels: [512, 512, 512, 512]
    neighbor_radius: [0.2, 0.4, 0.6, 0.8]
    seq_feature_channels: [512, 512, 512, 512]
    dense_channels: [512, 12]
    pos_embedding: true
    knn_query: feature
    activation: gelu
    normalization: layer
    standardize_latents: True
  condition_embedding:
    combine_condition: injection
    condition_injection: gate_bias
    encoder:
      name: OneHot
      type: categories
      out_channel: 128
      num_classes: 2
  reconstruction_losses: 
    - name: MSE
loader:
  dataset: 
    name: PcdSDFWithClassLabelDataset
    truncate_prob: 0.9
    resolution: 0.022
    data_dir: surface
    data_suffix: .ply
    target_dir: sdf022
    target_suffix: _sdf.npy
    cls_label: ImageCAS
  data_path_list: 
    - /media/wlsdzyzl/DATA/datasets/pcd/imageCAS/output_dilated/standardized/split/fold1
    - /media/wlsdzyzl/DATA/datasets/pcd/imageCAS/output_dilated/standardized/split/fold2
    - /media/wlsdzyzl/DATA/datasets/pcd/imageCAS/output_dilated/standardized/split/fold3
    - /media/wlsdzyzl/DATA/datasets/pcd/imageCAS/output_dilated/standardized/split/fold4
  batch_size: 2
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: FixedPoints
      method: qfps
      num: 2560
    - name: ToTensor
  target_transforms:
    - name: FixedPoints
      num: 2560
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 2
    - name: ToTensor
val_split_ratio: 0.1
val_split_seed: 42
## RTS, RC: radius constraints, Rscaling: radius scaling
check_point_dir: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SpResCNN_val_LPC/
### parameter for optimizer
optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 0.00000001
### scheduler for learning rate
lr_scheduler: 
  name: LinearLR
  start_factor: 1.0
  end_factor: 0.01
# resume: True
pretrained: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SpResCNN_val_LPC/ckp_best_loss.pth
max_epoch: 70
write_after_iters: 10
write_sample_num: 4
save_after_epochs: 2
warmup_epochs: 1
warmup_start_scale: 0.01
clip_grad: 1.0
# custom_write_results: [input_sphere, recon_dpm_sphere, gen_sphere]