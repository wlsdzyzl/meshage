# train ae or vae
#### a template for pcd encoder
mode: test
model:
  # can be AE, VAE, SeM and DDPM
  name: LDM
  diffusion:
    name: EDM
    classifier_free_guidance:
      condition_dropout: 0.2
      guidance_weight: 2.0
    eps_model:
      time_channel: 128
      encoder:
        name: SeqTrans
        in_channel: 16
        point_num: 256
        building_block: pct_sa
        seq_feature_channels: [512, 512, 512, 512, 512, 512]
        num_heads: 8
        d_k: 64
        activation: gelu
        normalization: layer
        # vector_embedding: false
      condition_embedding:
        combine_condition: injection
        condition_injection: gate_bias
        encoder:
          name: OneHot
          type: categories
          out_channel: 128
          num_classes: 2
        decoder: same_as_encoder
    eps_loss:
      name: MSE
  autoencoder:
    name: SDF
    latent_point_constraints: True
    coordinate_sampling_ratio: 0.1
    encoder:
      name: SPSDFCNN
      in_channel: 3
      out_channel: 1
      point_num: 2560
      building_block: res_dense
      projection_channel: 64
      num_neighbors_k: 32
      num_fps_points: [1280, 640, 320, 256]
      fps_feature_channels: [512, 512, 512, 512]
      neighbor_radius: [0.2, 0.4, 0.6, 0.8]
      seq_feature_channels: [512, 512, 512, 512]
      dense_channels: [512, 12]
      pos_embedding: true
      knn_query: feature
      activation: gelu
      normalization: layer
      standardize_latents: True
    condition_embedding:
      combine_condition: injection
      condition_injection: gate_bias
      encoder:
        name: OneHot
        type: categories
        out_channel: 128
        num_classes: 2
    reconstruction_losses: 
      - name: MSE
    
model_path:
  diff_model: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SeqTrans_SpCNN/ckp_last.pth
  ae_model: /media/wlsdzyzl/DATA/vcg-ckp/imageCAS/SpResCNN_val/ckp_best_loss.pth
eval_gen:
  conditions: 
    left: 1
    right: 2
  condition_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 2
    - name: ToTensor  
  sampler:
    name: NormalSampler
    batch_size: 2
  gen_dir: /media/wlsdzyzl/DATA/vcg-results/gen/imageCAS/LDM_EDM_SpCNN/
  ### new generation from random noise
  random_sample_num: 1024
